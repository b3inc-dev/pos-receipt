# 自社用アプリ（POS Receipt - Ciara など）
# デプロイ先: 自社用 Render の URL（例: https://pos-receipt-ciara.onrender.com）
# client_id はパートナーで作成した「自社用」アプリの Client ID に差し替える（公開用とは別の値）

client_id = "ec5374155070d767e71bbe5c258160e2"
name = "POS Receipt - Ciara"
application_url = "https://pos-receipt-ciara.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

# GDPR 必須コンプライアンス Webhook（topics ではなく compliance_topics を使用）
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "/webhooks/compliance"

[access.admin]
direct_api_mode = "offline"
embedded_app_direct_api_access = true

[access_scopes]
scopes = "read_orders,read_locations,read_customers,write_customers,write_app_proxy"

# 会員証 LIFF 用 App Proxy（公開URL: https://{shop}/apps/member-card）
[app_proxy]
url = "/apps/member-card"
prefix = "apps"
subpath = "member-card"

[auth]
redirect_urls = [ "https://pos-receipt-ciara.onrender.com" ]
